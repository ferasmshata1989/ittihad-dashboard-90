function importData(file){if(!file)return;const r=new FileReader();r.onload=e=>{try{const{data}=JSON.parse(e.target.result);Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));showToast('✅ Imported! Reloading...');setTimeout(()=>location.reload(),1000)}catch{showToast('❌ Invalid file','#e74c3c')}};r.readAsText(file)}

// Helpers
const sar=(n,s=false)=>{if(n==null||isNaN(n))return"—";const abs=Math.abs(parseFloat(n)),sign=n<0?"-":"";if(s&&abs>=1000000)return sign+"SAR "+(abs/1000000).toFixed(2)+"M";if(s&&abs>=1000)return sign+"SAR "+(abs/1000).toFixed(1)+"K";return sign+"SAR "+abs.toLocaleString("en",{maximumFractionDigits:0});};
const cvrC=v=>!v?"#444":v>=1.5?G.green:v>=1?G.gold:v>=0.5?G.orange:G.red;
const retC=v=>!v?"#444":v<=5?G.green:v<=15?G.gold:v<=30?G.orange:G.red;
const roasC=v=>v>=6?G.green:v>=4?G.gold:v>=2.5?G.orange:G.red;

const Bar=({pct,color,h=6})=><div style={{height:h,background:"#21262d",borderRadius:h,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(Math.max(pct||0,0),100)}%`,background:color,borderRadius:h,transition:"width 0.5s"}}/></div>;
const KpiCard=({icon,label,value,sub,color,small})=>(
  <div style={{background:G.card,border:`1px solid ${color}33`,borderRadius:12,padding:"12px 14px",flex:1,minWidth:100,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${color},transparent)`}}/>
    <div style={{fontSize:small?18:22,marginBottom:4}}>{icon}</div>
    <div style={{fontSize:small?15:20,fontWeight:800,color,lineHeight:1,marginBottom:3}}>{value}</div>
    <div style={{fontSize:10,color:G.muted,marginBottom:1}}>{label}</div>
    {sub&&<div style={{fontSize:9,color:G.dim}}>{sub}</div>}
  </div>
);
const Th=({children,color=G.muted,right=false})=><th style={{padding:"8px 10px",textAlign:right?"right":"center",color,fontSize:10,fontWeight:700,borderBottom:`1px solid ${G.border}`,background:G.row,whiteSpace:"nowrap"}}>{children}</th>;
const Td=({children,style={}})=><td style={{padding:"9px 10px",textAlign:"center",borderBottom:`1px solid ${G.border}`,fontSize:12,...style}}>{children}</td>;
const STitle=({en,ar,color=G.gold})=><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><div style={{width:3,height:14,background:color,borderRadius:2,flexShrink:0}}/><div style={{fontSize:11,fontWeight:700,color:"#9aa3b4",textTransform:"uppercase",letterSpacing:0.5}}>{en} / {ar}</div></div>;

function WeekTable({weeks,yc,t}){
  if(!weeks?.length)return null;
  const maxR=Math.max(...weeks.map(w=>Math.abs(w.rev||0)),1);
  const tot=weeks.reduce((a,w)=>a+(w.rev||0),0);
  return(
    <div style={{overflowX:"auto"}}>
      <table style={{minWidth:680}}>
        <thead><tr>
          <Th right color={yc}>{t.wk}</Th>
          <Th color={yc}>{t.revenue}</Th>
          <Th>{t.orders}</Th><Th>AOV</Th>
          <Th color={G.green}>CVR</Th><Th>{t.sessions}</Th>
          <Th color={G.red}>Ret SAR</Th><Th color={G.green}>New</Th>
        </tr></thead>
        <tbody>
          {weeks.map((w,wi)=>{
            const isN=(w.rev||0)<0,isP=w.rev===Math.max(...weeks.map(x=>x.rev||0));
            return(
              <tr key={wi} style={{background:isN?"#3a1e1e22":isP?yc+"11":wi%2===0?G.card:G.row}}>
                <td style={{padding:"8px 10px",borderBottom:`1px solid ${G.border}`,textAlign:"right"}}>
                  <div style={{fontWeight:700,fontSize:11,color:isN?G.red:isP?yc:G.gold}}>{w.flag||""} {t.wk} {wi+1}</div>
                  <div style={{fontSize:9,color:G.dim}}>{w.w}</div>
                </td>
                <Td><div style={{fontWeight:800,color:isN?G.red:isP?yc:"#e6edf3"}}>{sar(w.rev,true)}</div><Bar pct={Math.abs(w.rev||0)/maxR*100} color={isN?G.red:yc} h={3}/></Td>
                <Td style={{fontWeight:600,color:"#e6edf3"}}>{w.orders||"—"}</Td>
                <Td style={{color:G.muted,fontSize:11}}>{w.aov?"SAR "+w.aov:"—"}</Td>
                <Td style={{fontWeight:800,color:cvrC(w.cvr)}}>{w.cvr?w.cvr.toFixed(2)+"%":"—"}</Td>
                <Td style={{color:G.muted,fontSize:11}}>{w.sess?w.sess.toLocaleString():"—"}</Td>
                <Td style={{fontWeight:700,color:(w.retSAR||0)>0?G.red:"#555"}}>{(w.retSAR||0)>0?sar(-w.retSAR,true):"—"}</Td>
                <Td style={{fontWeight:600,color:(w.nc||0)>0?G.green:"#555"}}>{w.nc??"-"}</Td>
              </tr>
            );
          })}
          <tr style={{background:yc+"11",borderTop:`2px solid ${yc}44`}}>
            <td style={{padding:"9px 10px",fontWeight:800,color:yc,textAlign:"right"}}>Total</td>
            <Td style={{fontWeight:800,color:yc,fontSize:14}}>{sar(tot,true)}</Td>
            <Td style={{fontWeight:800,color:yc}}>{weeks.reduce((a,w)=>a+(w.orders||0),0)}</Td>
            <td colSpan={5}/>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

      const now=new Date();

        const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        setCd({phase:"before",d,h,m,s});
      } else if(now<=PIP_END){
        const diff=PIP_END-now;
        const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        const elapsed=Math.floor((now-PIP_START)/86400000);
        const pct=Math.min((elapsed/PIP_TOTAL)*100,100);
        setCd({phase:"active",d,h,m,s,elapsed,pct});
      } else {
        setCd({phase:"ended"});
      }
    }
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[]);

    return(
      <div>
        <div style={{background:"#3a1e1e",border:`1px solid ${G.red}44`,borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:22}}>🚨</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:G.red}}>Critical Issues / مشاكل حرجة</div>
            <div style={{fontSize:10,color:G.dim}}>Based on 2025–2026 data analysis</div>
          </div>
        </div>
        {ISSUES.map((issue,i)=>(
          <div key={i} style={{background:G.card,border:`1px solid ${issue.c}33`,borderRadius:13,padding:15,marginBottom:11,borderLeft:`4px solid ${issue.c}`}}>
            <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
              <span style={{fontSize:20,flexShrink:0}}>{issue.icon}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:issue.c+"22",color:issue.c,fontWeight:700}}>{issue.p}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#e6edf3"}}>{isAr?issue.ar:issue.en}</span>
                </div>
                <div style={{fontSize:11,color:G.muted,background:"#0d1117",borderRadius:7,padding:"8px 11px",lineHeight:1.6}}>
                  💡 <strong style={{color:"#c8d0dc"}}>Action: </strong>{isAr?issue.act_ar:issue.act_en}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ── Strategy ──────────────────────────────────────────────────
  function StrategyTab(){
    const total=STRATEGY.flatMap(p=>p.items).length;
    const done=STRATEGY.flatMap(p=>p.items).filter((_,i)=>checks[i]).length;
    const toggle=(idx)=>{const n={...checks,[idx]:!checks[idx]};saveChecks(n);bumpSave()};
    return(
      <div>
        <div style={{background:G.card,border:`1px solid ${G.gold}44`,borderRadius:14,padding:14,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:G.gold,marginBottom:2}}>Growth Plan 2026 / خطة النمو</div>
            <div style={{fontSize:10,color:G.dim}}>Click to mark done — auto-saved / اضغط لتعليم كمنجز</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:800,color:G.green}}>{done}<span style={{fontSize:13,color:G.dim}}>/{total}</span></div>
            <div style={{width:80}}><Bar pct={done/total*100} color={G.green} h={5}/></div>
          </div>
        </div>
        {STRATEGY.map((phase,pi)=>{
          const off=STRATEGY.slice(0,pi).reduce((a,p)=>a+p.items.length,0);
          const pDone=phase.items.filter((_,i)=>checks[off+i]).length;
          return(
            <div key={pi} style={{background:G.card,border:`1px solid ${phase.color}33`,borderRadius:14,padding:14,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:3,height:20,background:phase.color,borderRadius:2}}/>
                  <div>
                    <div style={{fontWeight:800,fontSize:13,color:phase.color}}>{phase.phase}</div>
                    <div style={{fontSize:10,color:G.dim}}>{isAr?phase.period_ar:phase.period_en}</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:phase.color}}>{pDone}/{phase.items.length}</div>
                  <div style={{width:60}}><Bar pct={pDone/phase.items.length*100} color={phase.color}/></div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {phase.items.map((item,ii)=>{
                  const gIdx=off+ii,done=checks[gIdx];
                  return(
                    <div key={ii} onClick={()=>toggle(gIdx)} style={{display:"flex",gap:9,alignItems:"flex-start",padding:"9px 12px",borderRadius:9,background:done?"#0d1117":G.row+"88",cursor:"pointer",border:`1px solid ${done?phase.color+"44":G.border}`,transition:"all 0.15s"}}>
                      <div style={{width:19,height:19,borderRadius:5,border:`2px solid ${done?phase.color:"#444"}`,background:done?phase.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                        {done&&<span style={{fontSize:11,color:"#0d1117",fontWeight:800}}>✓</span>}
                      </div>
                      <span style={{fontSize:12,color:done?G.dim:"#e6edf3",textDecoration:done?"line-through":"none",lineHeight:1.6}}>{isAr?item.ar:item.en}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <div style={{background:G.card,border:`1px solid ${G.blue}33`,borderRadius:14,overflow:"hidden"}}>
          <div style={{padding:"11px 15px",borderBottom:`1px solid ${G.border}`,background:G.blue+"11"}}>
            <div style={{fontSize:12,fontWeight:700,color:G.blue}}>Salla vs Shopify / مقارنة سلة مقابل شوبيفاي</div>
            <div style={{fontSize:10,color:G.dim}}>Migrate after PIP ends / الهجرة بعد الـ90 يوم</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><Th right>Item</Th><Th color={G.blue}>Shopify</Th><Th color={G.green}>Salla</Th><Th>Winner</Th></tr></thead>
              <tbody>
                {[["Monthly Cost","SAR 1,500–3,000","SAR 400–900","Salla"],["Arabic Native","Via translation","Built-in","Salla"],["Local Payments","Via apps","Built-in","Salla"],["App Ecosystem","Massive (global)","Growing (KSA)","Shopify"],["SEO","Strong","Moderate","Shopify"],["Custom Dev","Requires dev","Easier","Salla"],["Migration Risk","—","3–6 weeks","Shopify"],["Annual Saving","—","SAR 13–25K/yr","Salla"]].map((r,i)=>(
                  <tr key={i} style={{background:i%2===0?G.card:G.row}}>
                    <td style={{padding:"8px 11px",fontSize:12,fontWeight:600,color:"#e6edf3",borderBottom:`1px solid ${G.border}`,textAlign:"right"}}>{r[0]}</td>
                    <Td style={{color:r[3]==="Shopify"?G.green:G.muted,fontWeight:r[3]==="Shopify"?700:400}}>{r[1]}</Td>
                    <Td style={{color:r[3]==="Salla"?G.green:G.muted,fontWeight:r[3]==="Salla"?700:400}}>{r[2]}</Td>
                    <Td><span style={{fontSize:10,padding:"2px 7px",borderRadius:8,background:r[3]==="Salla"?G.green+"22":G.blue+"22",color:r[3]==="Salla"?G.green:G.blue,fontWeight:700}}>{r[3]} ✅</span></Td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  // ── Add Data ──────────────────────────────────────────────────
  function AddDataTab(){
    const [wf,setWf]=useState({year:"2026",month:"May",key:"",rev:"",orders:"",cvr:"",retSAR:"",retRate:"",sess:"",nc:""});
    const [mf,setMf]=useState({month:"May",rev:"",orders:"",cvr:"",retRate:"",retSAR:"",sess:"",nc:""});
    const [mode,setMode]=useState("week");
    const upW=(k,v)=>setWf(f=>({...f,[k]:v}));
    const upM=(k,v)=>setMf(f=>({...f,[k]:v}));
    const inpSt={width:"100%",background:"#0a0f18",border:"1px solid #30363d",borderRadius:7,color:"#e6edf3",fontSize:13,padding:"7px 10px",fontFamily:"inherit",outline:"none"};
    const lbl=(txt)=><div style={{fontSize:10,color:G.muted,marginBottom:4,marginTop:8}}>{txt}</div>;

    function saveWeek(){
      if(!wf.rev||!wf.orders)return;
      const mKey=wf.month+wf.year.slice(-2);
      const entry={w:wf.key||`Week ${new Date().toLocaleDateString('en',{month:'short',day:'2-digit'})}`,rev:parseFloat(wf.rev)||0,orders:parseInt(wf.orders)||0,aov:wf.rev&&wf.orders?(parseFloat(wf.rev)/parseInt(wf.orders)).toFixed(0):0,cvr:parseFloat(wf.cvr)||null,retSAR:parseFloat(wf.retSAR)||0,retRate:parseFloat(wf.retRate)||null,sess:parseInt(wf.sess)||null,nc:parseInt(wf.nc)||null,userAdded:true};
      const updated={...userWks,[mKey]:[...(userWks[mKey]||[]),entry]};
      saveUserWks(updated);
      if(wf.year==="2026"){
        const old=userM[wf.month]||{};
        const updM={...userM,[wf.month]:{...old,rev:(parseFloat(old.rev||0)+entry.rev).toFixed(0),orders:(parseInt(old.orders||0)+entry.orders).toString()}};
        saveUserM(updM);
      }
      bumpSave();
      showToast(t.weekAdded);
      setWf(f=>({...f,key:"",rev:"",orders:"",cvr:"",retSAR:"",retRate:"",sess:"",nc:""}));
    }

    function saveMonth(){
      if(!mf.rev&&!mf.orders)return;
      const updated={...userM,[mf.month]:{rev:mf.rev,orders:mf.orders,cvr:mf.cvr,retRate:mf.retRate,retSAR:mf.retSAR,sess:mf.sess,nc:mf.nc}};
      saveUserM(updated);
      bumpSave();
      showToast("Month saved ✓");
    }

    const months26=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const lockedM=["Jan","Feb","Mar","Apr"];

    return(
      <div>
        <div style={{background:G.teal+"14",border:`1px solid ${G.teal}44`,borderRadius:12,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:G.teal,marginBottom:4}}>➕ Add Data / إضافة بيانات</div>
          <div style={{fontSize:11,color:G.muted}}>All data is saved automatically in your browser / يتحفظ تلقائياً في المتصفح</div>
        </div>

        <div style={{display:"flex",background:G.row,borderRadius:10,padding:3,gap:2,marginBottom:16,width:"fit-content"}}>
          {[["week","Weekly / أسبوعي"],["month","Monthly / شهري"]].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} style={{padding:"6px 16px",borderRadius:8,background:mode===k?G.teal:"transparent",color:mode===k?"#0d1117":G.muted,fontWeight:mode===k?700:400,fontSize:12}}>
              {l}
            </button>
          ))}
        </div>

        {mode==="week"&&(
          <div style={{background:G.card,border:`1px solid ${G.teal}33`,borderRadius:14,padding:16}}>
            <div style={{fontSize:13,fontWeight:700,color:G.teal,marginBottom:14}}>Add Weekly Entry / إضافة أسبوع</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>
                {lbl("Year / السنة")}
                <select value={wf.year} onChange={e=>upW("year",e.target.value)} style={{...inpSt}}>
                  <option>2025</option><option>2026</option>
                </select>
              </div>
              <div>
                {lbl("Month / الشهر")}
                <select value={wf.month} onChange={e=>upW("month",e.target.value)} style={{...inpSt}}>
                  {(wf.year==="2026"?months26:["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]).map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div>
                {lbl("Week Label (e.g. 28 Apr) / تسمية الأسبوع")}
                <input value={wf.key} onChange={e=>upW("key",e.target.value)} placeholder="e.g. 28 Apr" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_rev)}
                <input type="number" value={wf.rev} onChange={e=>upW("rev",e.target.value)} placeholder="0" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_ord)}
                <input type="number" value={wf.orders} onChange={e=>upW("orders",e.target.value)} placeholder="0" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_cvr)}
                <input type="number" step="0.01" value={wf.cvr} onChange={e=>upW("cvr",e.target.value)} placeholder="e.g. 1.50" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_sess)}
                <input type="number" value={wf.sess} onChange={e=>upW("sess",e.target.value)} placeholder="0" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_retSAR)}
                <input type="number" value={wf.retSAR} onChange={e=>upW("retSAR",e.target.value)} placeholder="0" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_retRate)}
                <input type="number" step="0.1" value={wf.retRate} onChange={e=>upW("retRate",e.target.value)} placeholder="e.g. 3.5" style={inpSt}/>
              </div>
              <div>
                {lbl(t.enter_nc)}
                <input type="number" value={wf.nc} onChange={e=>upW("nc",e.target.value)} placeholder="0" style={inpSt}/>
              </div>
            </div>
            <button onClick={saveWeek} style={{width:"100%",background:G.teal,color:"#0d1117",border:"none",borderRadius:10,padding:"11px",fontWeight:800,fontSize:13,marginTop:14,cursor:"pointer"}}>
              💾 Save Week / حفظ الأسبوع
            </button>
          </div>
        )}

        {mode==="month"&&(
          <div style={{background:G.card,border:`1px solid ${G.gold}33`,borderRadius:14,padding:16}}>
            <div style={{fontSize:13,fontWeight:700,color:G.gold,marginBottom:14}}>Add Monthly Summary / إضافة ملخص شهري (2026)</div>
            <div>
              {lbl("Month / الشهر (2026)")}
              <select value={mf.month} onChange={e=>upM("month",e.target.value)} style={{...inpSt}}>
                {months26.filter(m=>!lockedM.includes(m)).map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
              {[[t.enter_rev,"rev"],[t.enter_ord,"orders"],["CVR %","cvr"],["Sessions","sess"],["Returns SAR","retSAR"],["Return Rate %","retRate"],["New Customers","nc"]].map(([l,k])=>(
                <div key={k}>
                  {lbl(l)}
                  <input type="number" value={mf[k]} onChange={e=>upM(k,e.target.value)} placeholder="0" style={inpSt}/>
                </div>
              ))}
            </div>
            <button onClick={saveMonth} style={{width:"100%",background:G.gold,color:"#0d1117",border:"none",borderRadius:10,padding:"11px",fontWeight:800,fontSize:13,marginTop:14,cursor:"pointer"}}>
              💾 Save Month / حفظ الشهر
            </button>
          </div>
        )}

        <div style={{background:G.card,border:"1px solid #21262d",borderRadius:14,padding:16,marginTop:16}}>
          <div style={{fontSize:12,fontWeight:700,color:G.muted,marginBottom:14}}>💾 Backup / نسخة احتياطية</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={exportData} style={{flex:1,minWidth:140,background:G.green+"22",border:`1px solid ${G.green}44`,borderRadius:10,padding:"10px",color:G.green,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              ⬇️ {t.export}
            </button>
            <label style={{flex:1,minWidth:140,background:G.blue+"22",border:`1px solid ${G.blue}44`,borderRadius:10,padding:"10px",color:G.blue,fontWeight:700,fontSize:12,cursor:"pointer",textAlign:"center"}}>
              ⬆️ {t.importBtn}
              <input type="file" accept=".json" onChange={e=>importData(e.target.files[0])} style={{display:"none"}}/>
            </label>
          </div>
          <div style={{marginTop:12,fontSize:10,color:G.dim}}>
            ⚡ Your data is stored in this browser. Use Export to backup before clearing cache.
            <br/>بياناتك محفوظة في هذا المتصفح. استخدم التصدير كنسخة احتياطية.
          </div>
        </div>
      </div>
    );
  }

  const VIEWS={pip:<PIPTab/>,overview:<OverviewTab/>,sales:<SalesTab/>,marketing:<MarketingTab/>,returns:<ReturnsTab/>,issues:<IssuesTab/>,strategy:<StrategyTab/>,adddata:<AddDataTab/>};

  return(
    <div style={{minHeight:"100vh",background:G.navy,color:"#e6edf3",direction:isAr?"rtl":"ltr"}}>
      {/* HEADER */}
      <div style={{background:G.card,borderBottom:`1px solid ${G.border}`,position:"sticky",top:0,zIndex:100}}>
        <div style={{padding:"0 14px",display:"flex",alignItems:"center",height:52,gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
            <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${G.gold},#e8c86b)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⚽</div>
            <div>
              <div style={{fontWeight:800,fontSize:13,color:G.gold,lineHeight:1}}>Al-Ittihad</div>
              <div style={{fontSize:9,color:G.dim}}>E-Commerce</div>
            </div>
          </div>

          {countdown.phase==="active"&&(
            <div onClick={()=>setTab("pip")} style={{background:G.gold+"18",border:`1px solid ${G.gold}44`,borderRadius:8,padding:"4px 10px",cursor:"pointer",display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              <span style={{fontSize:9,color:G.muted}}>PIP</span>
              <span style={{fontSize:13,fontWeight:900,color:G.gold,fontVariantNumeric:"tabular-nums"}}>{String(countdown.d).padStart(2,'0')}d {String(countdown.h).padStart(2,'0')}h {String(countdown.m).padStart(2,'0')}m</span>
            </div>
          )}

          <div className="tabs-scroll" style={{flex:1,display:"flex",gap:2,minWidth:0}}>
            {t.tabs.map((label,i)=>{
              const key=t.tabKeys[i],active=tab===key,c=TAB_C[key];
              return(
                <button key={key} onClick={()=>setTab(key)} style={{padding:"5px 9px",borderRadius:8,background:active?c+"22":"transparent",color:active?c:G.muted,fontWeight:active?700:400,fontSize:10,border:active?`1px solid ${c}44`:"1px solid transparent",whiteSpace:"nowrap",flexShrink:0}}>
                  {label}
                </button>
              );
            })}
          </div>

          <div style={{display:"flex",background:"#0d1117",borderRadius:8,padding:2,gap:1,flexShrink:0}}>
            {["en","ar"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"4px 9px",borderRadius:6,background:lang===l?G.gold:"transparent",color:lang===l?"#0d1117":G.muted,fontWeight:lang===l?800:400,fontSize:11,border:"none",cursor:"pointer"}}>
                {l==="en"?"EN":"عر"}
              </button>
            ))}
          </div>
        </div>

        {/* Status strip */}
        <div style={{padding:"4px 14px",borderTop:`1px solid ${G.border}`,display:"flex",gap:14,flexWrap:"wrap",background:"#0d111788"}}>
          {[{l:"2025",v:sar(t25,true),c:G.blue},{l:"2026 YTD",v:sar(t26,true),c:G.gold},{l:"CVR",v:"1.95% Apr ✅",c:G.green},{l:"ROAS",v:oROAS.toFixed(2)+"x",c:roasC(oROAS)},{l:"Returns",v:"SAR 260K",c:G.red},{l:"Mkt",v:"10.2%/20%",c:G.orange}].map(x=>(
            <div key={x.l} style={{display:"flex",gap:4,alignItems:"center",fontSize:10}}>
              <span style={{color:G.dim}}>{x.l}:</span>
              <strong style={{color:x.c}}>{x.v}</strong>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 14px",maxWidth:1300,margin:"0 auto"}}>
        {VIEWS[tab]}
      </div>

      <div style={{textAlign:"center",padding:"14px 0",marginTop:4,fontSize:9,color:"#2a3040"}}>
        {t.by} · Al-Ittihad Club Company (PIF) · {countdown.phase==="active"?`Day ${countdown.elapsed} of ${PIP_TOTAL}`:""}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
